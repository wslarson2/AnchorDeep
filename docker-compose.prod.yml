services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: anchordeep-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-anchordeep}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anchordeep
    # Don't expose to 0.0.0.0, keep internal only

  # Redis cache and job queue
  redis:
    image: redis:7-alpine
    container_name: anchordeep-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anchordeep
    # Don't expose to 0.0.0.0, keep internal only

  # Fastify API
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: anchordeep-api
    restart: unless-stopped
    ports:
      - "0.0.0.0:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-anchordeep}
      REDIS_URL: redis://redis:6379
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - anchordeep
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # React + Vite frontend
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: anchordeep-app
    restart: unless-stopped
    ports:
      - "0.0.0.0:5173:5173"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - anchordeep
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # AnchorDeep Scraper Service
  scraper:
    build:
      context: .
      dockerfile: scraper/Dockerfile
    container_name: anchordeep-scraper
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-anchordeep}
      REDIS_URL: redis://redis:6379
      API_BASE_URL: http://api:3001
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      PLAYWRIGHT_HEADLESS: "true"
      SCRAPE_ON_STARTUP: ${SCRAPE_ON_STARTUP:-false}
      EBAY_APP_ID: ${EBAY_APP_ID:-}
      PROXY_URL: ${PROXY_URL:-}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - anchordeep

  # Bull Board - Job Queue UI
  bull-board:
    image: deadly0/bull-board:latest
    container_name: anchordeep-bull-board
    restart: unless-stopped
    ports:
      - "0.0.0.0:3030:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - anchordeep
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  anchordeep:
    driver: bridge
